<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المعلم أشرف نصير | Ramzy Atef</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
        }
        /* شاشة تسجيل الدخول */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .login-card h2 { color: #1e4a76; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 14px 20px;
            margin: 15px 0;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            text-align: center;
        }
        .btn-login {
            background: #1e4a76;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
        }
        .error-msg { color: #dc2626; margin-top: 12px; font-size: 0.85rem; }
        /* التطبيق الرئيسي */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }
        .main-header {
            background: linear-gradient(115deg, #0a2b3e, #1b4f72);
            color: white;
            padding: 1.2rem 2rem;
            border-radius: 32px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .nav-buttons { display: flex; gap: 15px; }
        .nav-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            padding: 10px 26px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .nav-btn.active { background: #ffb347; color: #1e2f3a; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef2ff;
            padding-bottom: 15px;
        }
        .btn {
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: #1e4a76; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 0.75rem; }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-warning { background: #fff3e3; color: #b45309; }
        .avatar-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 15px;
            background: #f9fbfd;
            padding: 20px;
            border-radius: 28px;
            margin: 20px 0;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        input, select { padding: 10px 12px; border-radius: 20px; border: 1px solid #cbd5e1; }
        .back-link {
            display: inline-block;
            background: #e2e8f0;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .footer-credit {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            font-weight: bold;
        }
        .rainbow-text {
            background: linear-gradient(90deg, #ff6a00, #eeff00, #00ff88, #00aaff, #ff00c3);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: flowColors 3s linear infinite;
        }
        @keyframes flowColors {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .multi-color-text {
            background: linear-gradient(135deg, #ff9966, #ff5e62, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
<div id="loginScreen" class="login-overlay">
    <div class="login-card">
        <h2>🔐 المعلم أشرف نصير</h2>
        <p>أدخل كلمة المرور للدخول</p>
        <input type="password" id="passwordInput" placeholder="كلمة المرور" autocomplete="off">
        <button id="loginBtn" class="btn-login">دخول</button>
        <div id="loginError" class="error-msg"></div>
        <div style="margin-top:20px; font-size:12px;">Developed by Ramzy Atef</div>
    </div>
</div>

<div id="mainApp" class="app-container">
    <div class="main-header">
        <div><h1>📊 المعلم أشرف نصير</h1><small>نظام متكامل لإدارة العملاء والموردين</small></div>
        <div class="nav-buttons">
            <button id="navClientsBtn" class="nav-btn">👥 العملاء</button>
            <button id="navSuppliersBtn" class="nav-btn">🏭 الموردين</button>
            <button id="logoutBtn" class="nav-btn" style="background:#c2410c;">🚪 خروج</button>
        </div>
    </div>
    <div id="appContent"></div>
    <div class="footer-credit">
        <span class="rainbow-text">✨ Developed by Ramzy Atef | Web Developer ✨</span><br>
        <span class="multi-color-text">المعلم أشرف نصير | إدارة متقدمة | صور شخصية ودفعات</span>
    </div>
</div>

<script>
    // ------------------- الحماية -------------------
    const PASSWORD_KEY = "business_pro_password";
    const DATA_KEY = "business_pro_full_data";
    
    function initPassword() {
        // تم تغيير كلمة المرور الافتراضية إلى 15199
        if(!localStorage.getItem(PASSWORD_KEY)) localStorage.setItem(PASSWORD_KEY, "15199");
    }
    function checkPassword(pass) { return pass === localStorage.getItem(PASSWORD_KEY); }
    function logout() { localStorage.removeItem(PASSWORD_KEY); location.reload(); }
    
    // ------------------- هيكل البيانات -------------------
    let appData = { clients: [], suppliers: [] };
    
    function getDefaultAvatar(name) {
        const color = `hsl(${Math.abs(name.charCodeAt(0) % 360)}, 70%, 65%)`;
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="${color}"/><text x="50" y="67" font-size="50" text-anchor="middle" fill="white" font-weight="bold">${name.charAt(0).toUpperCase()}</text></svg>`;
        return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
    }
    
    function saveData() { localStorage.setItem(DATA_KEY, JSON.stringify(appData)); }
    function loadData() {
        const stored = localStorage.getItem(DATA_KEY);
        if(stored) { appData = JSON.parse(stored); }
        else {
            appData = {
                clients: [{
                    id: "c1", name: "محل الأماني", phone: "0501234567",
                    avatarBase64: getDefaultAvatar("محل الأماني"),
                    transactions: [{ id: "t1", productName: "شاشة 55", price: 450, quantity: 2, date: "2025-03-10", total: 900 }],
                    payments: [{ id: "p1", amount: 500, date: "2025-03-12", note: "دفعة أولى" }]
                }],
                suppliers: [{
                    id: "s1", name: "شركة النور", contact: "0559876543",
                    avatarBase64: getDefaultAvatar("شركة النور"),
                    transactions: [{ id: "st1", materialName: "ألمنيوم", price: 22, quantity: 100, date: "2025-03-05", total: 2200 }],
                    payments: [{ id: "sp1", amount: 1500, date: "2025-03-07", note: "دفعة" }]
                }]
            };
            saveData();
        }
    }
    
    // دوال العملاء
    function addClient(name, phone, avatar) { let c={ id: Date.now()+"", name, phone: phone||"", avatarBase64: avatar||getDefaultAvatar(name), transactions: [], payments: [] }; appData.clients.push(c); saveData(); return c; }
    function deleteClient(id) { appData.clients = appData.clients.filter(c=>c.id!=id); saveData(); }
    function updateClientName(id, newName) { let c = appData.clients.find(c=>c.id==id); if(c){ c.name=newName; saveData(); } }
    function updateClientAvatar(id, base64) { let c = appData.clients.find(c=>c.id==id); if(c){ c.avatarBase64=base64; saveData(); } }
    function addClientTransaction(clientId, product, price, qty, date) { let c=appData.clients.find(c=>c.id==clientId); if(c){ c.transactions.push({ id:Date.now()+"", productName:product, price:parseFloat(price), quantity:parseFloat(qty), date:date, total:price*qty }); saveData(); } }
    function deleteClientTransaction(clientId, transId) { let c=appData.clients.find(c=>c.id==clientId); if(c) c.transactions = c.transactions.filter(t=>t.id!=transId); saveData(); }
    function editClientTransaction(clientId, transId, updated) { let c=appData.clients.find(c=>c.id==clientId); if(c){ let t=c.transactions.find(t=>t.id==transId); if(t){ Object.assign(t, updated); t.total = t.price * t.quantity; saveData(); } } }
    function addClientPayment(clientId, amount, date, note) { let c=appData.clients.find(c=>c.id==clientId); if(c){ c.payments.push({ id:Date.now()+"", amount:parseFloat(amount), date, note:note||"" }); saveData(); } }
    function deleteClientPayment(clientId, payId) { let c=appData.clients.find(c=>c.id==clientId); if(c) c.payments = c.payments.filter(p=>p.id!=payId); saveData(); }
    function editClientPayment(clientId, payId, amount, date, note) { let c=appData.clients.find(c=>c.id==clientId); if(c){ let p=c.payments.find(p=>p.id==payId); if(p){ p.amount=parseFloat(amount); p.date=date; p.note=note; saveData(); } } }
    
    // دوال الموردين
    function addSupplier(name, contact, avatar) { let s={ id: Date.now()+"", name, contact:contact||"", avatarBase64: avatar||getDefaultAvatar(name), transactions: [], payments: [] }; appData.suppliers.push(s); saveData(); return s; }
    function deleteSupplier(id) { appData.suppliers = appData.suppliers.filter(s=>s.id!=id); saveData(); }
    function updateSupplierName(id, newName) { let s=appData.suppliers.find(s=>s.id==id); if(s){ s.name=newName; saveData(); } }
    function updateSupplierAvatar(id, base64) { let s=appData.suppliers.find(s=>s.id==id); if(s){ s.avatarBase64=base64; saveData(); } }
    function addSupplierTransaction(supId, material, price, qty, date) { let s=appData.suppliers.find(s=>s.id==supId); if(s){ s.transactions.push({ id:Date.now()+"", materialName:material, price:parseFloat(price), quantity:parseFloat(qty), date, total:price*qty }); saveData(); } }
    function deleteSupplierTransaction(supId, transId) { let s=appData.suppliers.find(s=>s.id==supId); if(s) s.transactions = s.transactions.filter(t=>t.id!=transId); saveData(); }
    function editSupplierTransaction(supId, transId, updated) { let s=appData.suppliers.find(s=>s.id==supId); if(s){ let t=s.transactions.find(t=>t.id==transId); if(t){ Object.assign(t, updated); t.total = t.price * t.quantity; saveData(); } } }
    function addSupplierPayment(supId, amount, date, note) { let s=appData.suppliers.find(s=>s.id==supId); if(s){ s.payments.push({ id:Date.now()+"", amount:parseFloat(amount), date, note:note||"" }); saveData(); } }
    function deleteSupplierPayment(supId, payId) { let s=appData.suppliers.find(s=>s.id==supId); if(s) s.payments = s.payments.filter(p=>p.id!=payId); saveData(); }
    function editSupplierPayment(supId, payId, amount, date, note) { let s=appData.suppliers.find(s=>s.id==supId); if(s){ let p=s.payments.find(p=>p.id==payId); if(p){ p.amount=parseFloat(amount); p.date=date; p.note=note; saveData(); } } }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // عرض قائمة العملاء
    function renderClientsList() {
        let html = `<div class="card"><div class="dashboard-header"><h2>👥 العملاء</h2><button id="addClientBtn" class="btn btn-primary">➕ عميل جديد</button></div><table><thead><tr><th>الصورة</th><th>الاسم</th><th>الهاتف</th><th>إجمالي المشتريات</th><th>المدفوع</th><th>المتبقي</th><th>إجراءات</th></tr></thead><tbody>`;
        appData.clients.forEach(c => {
            let totalSales = c.transactions.reduce((s,t)=>s+t.total,0);
            let paid = c.payments.reduce((s,p)=>s+p.amount,0);
            let balance = totalSales - paid;
            html += `<tr>
                <td><div class="avatar-circle" style="width:40px;height:40px;"><img src="${c.avatarBase64}" class="avatar-img"></div></td>
                <td><strong>${escapeHtml(c.name)}</strong></td>
                <td>${escapeHtml(c.phone||"—")}</td>
                <td>${totalSales.toFixed(2)}</td><td>${paid.toFixed(2)}</td><td style="color:${balance>0?'red':'green'}">${balance.toFixed(2)}</td>
                <td><button class="btn btn-sm viewClient" data-id="${c.id}">📄 صفحته</button>
                <button class="btn btn-sm editAvatarClient" data-id="${c.id}">🖼️ صورة</button>
                <button class="btn btn-sm btn-danger deleteClient" data-id="${c.id}">🗑️</button></td>
            </tr>`;
        });
        html += `</tbody>点心</div>`;
        document.getElementById("appContent").innerHTML = html;
        document.getElementById("addClientBtn")?.addEventListener("click",()=>{ let n=prompt("اسم العميل"); if(n){ addClient(n); renderClientsList(); } });
        document.querySelectorAll(".viewClient").forEach(btn=>btn.addEventListener("click",()=>{ window.location.hash=`client/${btn.dataset.id}`; }));
        document.querySelectorAll(".deleteClient").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("حذف العميل؟")){ deleteClient(btn.dataset.id); renderClientsList(); } }));
        document.querySelectorAll(".editAvatarClient").forEach(btn=>{ btn.addEventListener("click",()=>{ let inp=document.createElement("input"); inp.type="file"; inp.accept="image/*"; inp.onchange=e=>{ let file=e.target.files[0]; if(file){ let fr=new FileReader(); fr.onload=ev=>{ updateClientAvatar(btn.dataset.id, ev.target.result); renderClientsList(); }; fr.readAsDataURL(file); } }; inp.click(); }); });
    }
    
    // عرض قائمة الموردين
    function renderSuppliersList() {
        let html = `<div class="card"><div class="dashboard-header"><h2>🏭 الموردين</h2><button id="addSupplierBtn" class="btn btn-primary">➕ مورد جديد</button></div><table><thead><tr><th>الصورة</th><th>الاسم</th><th>جهة الاتصال</th><th>إجمالي الخامات</th><th>المدفوع</th><th>المتبقي</th><th>إجراءات</th></tr></thead><tbody>`;
        appData.suppliers.forEach(s => {
            let totalPur = s.transactions.reduce((a,b)=>a+b.total,0);
            let paid = s.payments.reduce((a,b)=>a+b.amount,0);
            let bal = totalPur - paid;
            html += `<tr>
                <td><div class="avatar-circle" style="width:40px;height:40px;"><img src="${s.avatarBase64}" class="avatar-img"></div></td>
                <td><strong>${escapeHtml(s.name)}</strong></td>
                <td>${escapeHtml(s.contact||"—")}</td>
                <td>${totalPur.toFixed(2)}</td><td>${paid.toFixed(2)}</td><td style="color:${bal>0?'red':'green'}">${bal.toFixed(2)}</td>
                <td><button class="btn btn-sm viewSupplier" data-id="${s.id}">📄 صفحته</button>
                <button class="btn btn-sm editAvatarSup" data-id="${s.id}">🖼️ صورة</button>
                <button class="btn btn-sm btn-danger deleteSupplier" data-id="${s.id}">🗑️</button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById("appContent").innerHTML = html;
        document.getElementById("addSupplierBtn")?.addEventListener("click",()=>{ let n=prompt("اسم المورد"); if(n){ addSupplier(n); renderSuppliersList(); } });
        document.querySelectorAll(".viewSupplier").forEach(btn=>btn.addEventListener("click",()=>{ window.location.hash=`supplier/${btn.dataset.id}`; }));
        document.querySelectorAll(".deleteSupplier").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("حذف المورد؟")){ deleteSupplier(btn.dataset.id); renderSuppliersList(); } }));
        document.querySelectorAll(".editAvatarSup").forEach(btn=>{ btn.addEventListener("click",()=>{ let inp=document.createElement("input"); inp.type="file"; inp.accept="image/*"; inp.onchange=e=>{ let file=e.target.files[0]; if(file){ let fr=new FileReader(); fr.onload=ev=>{ updateSupplierAvatar(btn.dataset.id, ev.target.result); renderSuppliersList(); }; fr.readAsDataURL(file); } }; inp.click(); }); });
    }
    
    // صفحة العميل المفصلة (كل التفاصيل + نماذج إدخال)
    function renderClientDetail(clientId) {
        let client = appData.clients.find(c=>c.id==clientId);
        if(!client){ window.location.hash="clients"; return; }
        let totalSales = client.transactions.reduce((s,t)=>s+t.total,0);
        let paid = client.payments.reduce((s,p)=>s+p.amount,0);
        let balance = totalSales - paid;
        let html = `<div><div class="back-link" id="backBtn">🔙 العودة للعملاء</div>
        <div class="card"><div class="dashboard-header"><div style="display:flex; gap:15px; align-items:center;"><div class="avatar-circle" style="width:70px;height:70px;"><img src="${client.avatarBase64}" class="avatar-img"></div><h2>${escapeHtml(client.name)}</h2></div><button id="editClientName" class="btn btn-warning">✏️ تعديل الاسم</button></div>
        <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:25px;"><div class="summary-item">💰 المشتريات: ${totalSales.toFixed(2)}</div><div class="summary-item">💵 المدفوع: ${paid.toFixed(2)}</div><div class="summary-item">⚖️ المتبقي: ${balance.toFixed(2)}</div></div>
        <h3>🛒 المنتجات (السعر، الكمية، التاريخ)</h3>
        <div id="clientTransArea"></div>
        <div class="form-grid"><div class="form-group"><label>اسم المنتج</label><input id="prodName" placeholder="مثال: شاشة"></div><div class="form-group"><label>السعر</label><input id="prodPrice" type="number"></div><div class="form-group"><label>الكمية</label><input id="prodQty" type="number"></div><div class="form-group"><label>التاريخ</label><input id="prodDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><button id="addProductBtn" class="btn btn-primary">➕ إضافة منتج</button></div></div>
        <h3>💸 دفعات العميل</h3>
        <div id="clientPayArea"></div>
        <div class="form-grid"><div class="form-group"><label>المبلغ</label><input id="payAmount" type="number"></div><div class="form-group"><label>التاريخ</label><input id="payDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="form-group"><label>ملاحظة</label><input id="payNote" placeholder="دفعة رقم..."></div><div><button id="addPaymentBtn" class="btn btn-primary">➕ إضافة دفعة</button></div></div>
        </div></div>`;
        document.getElementById("appContent").innerHTML = html;
        document.getElementById("backBtn")?.addEventListener("click",()=>{ window.location.hash="clients"; });
        document.getElementById("editClientName")?.addEventListener("click",()=>{ let newName=prompt("الاسم الجديد", client.name); if(newName){ updateClientName(client.id, newName); renderClientDetail(client.id); } });
        
        function refreshTransAndPayments() {
            // عرض المنتجات
            let transHtml = `<table><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>التاريخ</th><th>الإجمالي</th><th>إجراءات</th></tr></thead><tbody>`;
            client.transactions.forEach(t => {
                transHtml += `<tr><td>${escapeHtml(t.productName)}</td><td>${t.price}</td><td>${t.quantity}</td><td>${t.date}</td><td>${t.total}</td>
                <td><button class="btn btn-sm btn-warning editTrans" data-id="${t.id}">✏️</button><button class="btn btn-sm btn-danger delTrans" data-id="${t.id}">🗑️</button></td>
                </tr>`;
            });
            transHtml += `</tbody></table>`;
            document.getElementById("clientTransArea").innerHTML = transHtml;
            document.querySelectorAll(".delTrans").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("حذف المنتج؟")){ deleteClientTransaction(client.id, btn.dataset.id); renderClientDetail(client.id); } }));
            document.querySelectorAll(".editTrans").forEach(btn=>btn.addEventListener("click",()=>{ let t=client.transactions.find(tr=>tr.id==btn.dataset.id); if(t){ let newName=prompt("اسم المنتج", t.productName); let newPrice=prompt("السعر", t.price); let newQty=prompt("الكمية", t.quantity); let newDate=prompt("التاريخ", t.date); if(newName && newPrice && newQty && newDate){ editClientTransaction(client.id, t.id, { productName:newName, price:parseFloat(newPrice), quantity:parseFloat(newQty), date:newDate }); renderClientDetail(client.id); } } }));
            // عرض الدفعات
            let payHtml = `<table><thead><tr><th>المبلغ</th><th>التاريخ</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>`;
            client.payments.forEach(p=>{
                payHtml += `<tr><td>${p.amount}</td><td>${p.date}</td><td>${escapeHtml(p.note)}</td>
                <td><button class="btn btn-sm btn-warning editPay" data-id="${p.id}">✏️</button><button class="btn btn-sm btn-danger delPay" data-id="${p.id}">🗑️</button></td>
                </tr>`;
            });
            payHtml += `</tbody></table>`;
            document.getElementById("clientPayArea").innerHTML = payHtml;
            document.querySelectorAll(".delPay").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("حذف الدفعة؟")){ deleteClientPayment(client.id, btn.dataset.id); renderClientDetail(client.id); } }));
            document.querySelectorAll(".editPay").forEach(btn=>btn.addEventListener("click",()=>{ let p=client.payments.find(pay=>pay.id==btn.dataset.id); if(p){ let amt=prompt("المبلغ", p.amount); let dt=prompt("التاريخ", p.date); let nt=prompt("ملاحظة", p.note); if(amt && dt){ editClientPayment(client.id, p.id, parseFloat(amt), dt, nt); renderClientDetail(client.id); } } }));
        }
        document.getElementById("addProductBtn")?.addEventListener("click",()=>{ let pname=document.getElementById("prodName").value; let price=parseFloat(document.getElementById("prodPrice").value); let qty=parseFloat(document.getElementById("prodQty").value); let date=document.getElementById("prodDate").value; if(pname && price>0 && qty>0 && date){ addClientTransaction(client.id, pname, price, qty, date); renderClientDetail(client.id); } else alert("املأ البيانات بشكل صحيح"); });
        document.getElementById("addPaymentBtn")?.addEventListener("click",()=>{ let amt=parseFloat(document.getElementById("payAmount").value); let date=document.getElementById("payDate").value; let note=document.getElementById("payNote").value; if(amt>0 && date){ addClientPayment(client.id, amt, date, note); renderClientDetail(client.id); } else alert("المبلغ مطلوب"); });
        refreshTransAndPayments();
    }
    
    // صفحة المورد المفصلة
    function renderSupplierDetail(supplierId) {
        let sup = appData.suppliers.find(s=>s.id==supplierId);
        if(!sup){ window.location.hash="suppliers"; return; }
        let totalPur = sup.transactions.reduce((a,b)=>a+b.total,0);
        let paid = sup.payments.reduce((a,b)=>a+b.amount,0);
        let bal = totalPur - paid;
        let html = `<div><div class="back-link" id="backBtn">🔙 العودة للموردين</div>
        <div class="card"><div class="dashboard-header"><div style="display:flex; gap:15px;"><div class="avatar-circle" style="width:70px;height:70px;"><img src="${sup.avatarBase64}" class="avatar-img"></div><h2>${escapeHtml(sup.name)}</h2></div><button id="editSupName" class="btn btn-warning">✏️ تعديل الاسم</button></div>
        <div style="display:flex; gap:20px;"><div>إجمالي الخامات: ${totalPur.toFixed(2)}</div><div>المدفوع: ${paid.toFixed(2)}</div><div>المتبقي: ${bal.toFixed(2)}</div></div>
        <h3>🧱 تفاصيل الخامات</h3><div id="supTransArea"></div>
        <div class="form-grid"><div class="form-group"><label>اسم الخامة</label><input id="matName"></div><div class="form-group"><label>السعر</label><input id="matPrice" type="number"></div><div class="form-group"><label>الكمية</label><input id="matQty" type="number"></div><div class="form-group"><label>التاريخ</label><input id="matDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><button id="addMatBtn" class="btn btn-primary">➕ إضافة خامة</button></div></div>
        <h3>💵 دفعات المورد</h3><div id="supPayArea"></div>
        <div class="form-grid"><div class="form-group"><label>المبلغ</label><input id="supPayAmount" type="number"></div><div class="form-group"><label>التاريخ</label><input id="supPayDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="form-group"><label>ملاحظة</label><input id="supPayNote"></div><div><button id="addSupPayBtn" class="btn btn-primary">➕ إضافة دفعة</button></div></div>
        </div></div>`;
        document.getElementById("appContent").innerHTML = html;
        document.getElementById("backBtn")?.addEventListener("click",()=>{ window.location.hash="suppliers"; });
        document.getElementById("editSupName")?.addEventListener("click",()=>{ let nn=prompt("الاسم الجديد", sup.name); if(nn){ updateSupplierName(sup.id, nn); renderSupplierDetail(sup.id); } });
        function refreshSup() {
            let transHtml = `<table><thead><tr><th>الخامة</th><th>السعر</th><th>الكمية</th><th>التاريخ</th><th>الإجمالي</th><th>إجراءات</th></tr></thead><tbody>`;
            sup.transactions.forEach(t=>{
                transHtml += `<tr><td>${escapeHtml(t.materialName)}</td><td>${t.price}</td><td>${t.quantity}</td><td>${t.date}</td><td>${t.total}</td>
                <td><button class="btn btn-sm btn-warning editSupTrans" data-id="${t.id}">✏️</button><button class="btn btn-sm btn-danger delSupTrans" data-id="${t.id}">🗑️</button></td>
                </tr>`;
            });
            transHtml += `</tbody></table>`;
            document.getElementById("supTransArea").innerHTML = transHtml;
            document.querySelectorAll(".delSupTrans").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("حذف الخامة؟")){ deleteSupplierTransaction(sup.id, btn.dataset.id); renderSupplierDetail(sup.id); } }));
            document.querySelectorAll(".editSupTrans").forEach(btn=>btn.addEventListener("click",()=>{ let t=sup.transactions.find(tr=>tr.id==btn.dataset.id); if(t){ let mat=prompt("اسم الخامة", t.materialName); let pr=prompt("السعر", t.price); let q=prompt("الكمية", t.quantity); let d=prompt("التاريخ", t.date); if(mat && pr && q && d){ editSupplierTransaction(sup.id, t.id, { materialName:mat, price:parseFloat(pr), quantity:parseFloat(q), date:d }); renderSupplierDetail(sup.id); } } }));
            let payHtml = `<table><thead><tr><th>المبلغ</th><th>التاريخ</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>`;
            sup.payments.forEach(p=>{
                payHtml += `<tr><td>${p.amount}</td><td>${p.date}</td><td>${escapeHtml(p.note)}</td>
                <td><button class="btn btn-sm btn-warning editSupPay" data-id="${p.id}">✏️</button><button class="btn btn-sm btn-danger delSupPay" data-id="${p.id}">🗑️</button></td>
                </tr>`;
            });
            payHtml += `</tbody></table>`;
            document.getElementById("supPayArea").innerHTML = payHtml;
            document.querySelectorAll(".delSupPay").forEach(btn=>btn.addEventListener("click",()=>{ if(confirm("حذف الدفعة؟")){ deleteSupplierPayment(sup.id, btn.dataset.id); renderSupplierDetail(sup.id); } }));
            document.querySelectorAll(".editSupPay").forEach(btn=>btn.addEventListener("click",()=>{ let p=sup.payments.find(pay=>pay.id==btn.dataset.id); if(p){ let amt=prompt("المبلغ", p.amount); let dt=prompt("التاريخ", p.date); let nt=prompt("ملاحظة", p.note); if(amt && dt){ editSupplierPayment(sup.id, p.id, parseFloat(amt), dt, nt); renderSupplierDetail(sup.id); } } }));
        }
        document.getElementById("addMatBtn")?.addEventListener("click",()=>{ let mat=document.getElementById("matName").value; let price=parseFloat(document.getElementById("matPrice").value); let qty=parseFloat(document.getElementById("matQty").value); let date=document.getElementById("matDate").value; if(mat && price>0 && qty>0 && date){ addSupplierTransaction(sup.id, mat, price, qty, date); renderSupplierDetail(sup.id); } else alert("بيانات غير صحيحة"); });
        document.getElementById("addSupPayBtn")?.addEventListener("click",()=>{ let amt=parseFloat(document.getElementById("supPayAmount").value); let date=document.getElementById("supPayDate").value; let note=document.getElementById("supPayNote").value; if(amt>0 && date){ addSupplierPayment(sup.id, amt, date, note); renderSupplierDetail(sup.id); } else alert("المبلغ مطلوب"); });
        refreshSup();
    }
    
    function router() {
        let hash = window.location.hash.slice(1);
        if(hash.startsWith("client/")) renderClientDetail(hash.split("/")[1]);
        else if(hash.startsWith("supplier/")) renderSupplierDetail(hash.split("/")[1]);
        else if(hash === "suppliers") renderSuppliersList();
        else renderClientsList();
        let navC = document.getElementById("navClientsBtn"), navS = document.getElementById("navSuppliersBtn");
        if(navC && navS){
            let isClients = (hash === "clients" || hash.startsWith("client/") || hash === "");
            let isSuppliers = (hash === "suppliers" || hash.startsWith("supplier/"));
            navC.classList.toggle("active", isClients);
            navS.classList.toggle("active", isSuppliers);
        }
    }
    
    // بدء التشغيل
    initPassword();
    document.getElementById("loginBtn")?.addEventListener("click",()=>{
        let pass = document.getElementById("passwordInput").value;
        if(checkPassword(pass)){
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            loadData();
            router();
            window.addEventListener("hashchange", router);
            document.getElementById("navClientsBtn")?.addEventListener("click",()=>{ window.location.hash="clients"; });
            document.getElementById("navSuppliersBtn")?.addEventListener("click",()=>{ window.location.hash="suppliers"; });
            document.getElementById("logoutBtn")?.addEventListener("click",()=>{ logout(); });
        } else { document.getElementById("loginError").innerText = "كلمة المرور غير صحيحة"; }
    });
    document.getElementById("passwordInput")?.addEventListener("keypress",(e)=>{ if(e.key==="Enter") document.getElementById("loginBtn").click(); });
</script>
</body>
</html>
